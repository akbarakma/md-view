services:
  md-view:
    build:
      context: .
      dockerfile: Dockerfile
    image: md-view:latest
    container_name: md-view
    restart: unless-stopped
    ports:
      # Bind to loopback only — reverse proxy (nginx/Caddy) on host terminates TLS
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
